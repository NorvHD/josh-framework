$engine: 3
$minFxVersion: 12913
$onesync: on

name: Josh Framework
version: 0.1.0
author: ThomasNRP

description: >-
  Base txAdmin recipe for a standalone custom FiveM framework.
  Downloads cfx-server-data, oxmysql, ox_lib, and the Josh Framework repo,
  writes a base server.cfg, and imports the framework SQL.

variables:
  frameworkRepo: frameworkRepo: https://github.com/NorvHD/josh-framework
  frameworkRef: main

tasks:
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    subpath: resources
    dest: ./resources/[cfx-default]

  - action: connect_database

  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    path: ./tmp/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[ox]

  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    path: ./tmp/ox_lib.zip

  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[ox]

  - action: download_github
    src: '{{frameworkRepo}}'
    ref: '{{frameworkRef}}'
    dest: ./tmp/josh-framework

  - action: move_path
    src: ./tmp/josh-framework/josh_core
    dest: ./resources/[joshua]/josh_core

  - action: query_database
    file: ./resources/[joshua]/josh_core/sql/josh_framework.sql

  - action: write_file
    file: ./server.cfg
    data: |
      # Generated by txAdmin recipe
      sv_hostname "{{serverName}}"
      sv_maxclients {{maxClients}}
      set sv_licenseKey {{svLicense}}
      endpoint_add_tcp "0.0.0.0:30120"
      endpoint_add_udp "0.0.0.0:30120"

      set mysql_connection_string "{{dbConnectionString}}"

      set onesync on
      setr ox:locale en
      setr game_enableFlyThroughWindscreen true

      ensure [cfx-default]
      ensure oxmysql
      ensure ox_lib
      ensure josh_core

  - action: remove_path
    path: ./tmp
